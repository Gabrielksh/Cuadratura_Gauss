site_name: Tarea 2 - Física Computacional
theme:
  name: material

plugins:
  - search
  - mkdocstrings

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Inicio: index.md
  - Explicación: explanation.md
  - Tutorial: tutorials.md
  - Referencia: reference.md
